# 🚨 DEPRECATED: Los servers legacy (alebet-server, deposito-server, admin-server)
# fueron reemplazados por el unified platform server (@platform/server).
# El deploy unificado se maneja via apps/platform/server/railway.json.
#
# Mantenido solo como referencia. No usar para deploys nuevos.

services:
  - type: web
    name: platform-server
    runtime: node
    rootDir: .
    buildCommand: cd apps/platform/server && npm install && npx prisma generate --schema=../../packages/db/prisma/schema.prisma && npm run build
    startCommand: node apps/platform/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLATFORM_DATABASE_URL
        sync: false
      - key: PLATFORM_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://tu-dominio/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://tu-frontend.vercel.app
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: ivnvaldz@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_KEY
        sync: false
